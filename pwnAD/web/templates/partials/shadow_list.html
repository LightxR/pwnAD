{% for cred in credentials %}
<tr class="hover:bg-white/[0.02]">
    <td class="px-4 py-2.5 font-mono text-xs text-white select-all">{{ cred.device_id }}</td>
    <td class="px-4 py-2.5 text-sm text-neutral-400">{{ cred.creation_time }}</td>
    <td class="px-4 py-2.5 text-right">
        <button onclick="shadowRemove('{{ target }}', '{{ cred.device_id }}')"
            class="text-red-400 hover:text-red-300 text-xs" title="Remove">
            <i class="fas fa-trash"></i>
        </button>
    </td>
</tr>
{% endfor %}
{% if credentials|length == 0 %}
<tr><td colspan="3" class="px-4 py-8 text-center text-neutral-500">No key credentials found</td></tr>
{% endif %}
