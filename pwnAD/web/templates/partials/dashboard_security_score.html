{% if error %}
<div class="flex items-center gap-3">
    <i class="fas fa-exclamation-triangle text-red-400"></i>
    <span class="text-sm text-neutral-500">{{ error }}</span>
</div>
{% else %}
<div class="flex items-start gap-6">
    <div class="relative w-20 h-20 shrink-0">
        <svg class="w-20 h-20" viewBox="0 0 80 80" style="transform:rotate(-90deg)">
            <circle cx="40" cy="40" r="32" fill="none" stroke="#262626" stroke-width="5"/>
            <circle cx="40" cy="40" r="32" fill="none"
                stroke="{% if score >= 80 %}#4ade80{% elif score >= 50 %}#fbbf24{% else %}#ef4444{% endif %}"
                stroke-width="5" stroke-linecap="round"
                stroke-dasharray="{{ (score * 201.1 / 100)|round(1) }} 201.1"/>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
            <span class="text-2xl font-bold {% if score >= 80 %}text-green-400{% elif score >= 50 %}text-yellow-400{% else %}text-red-400{% endif %}">{{ score }}</span>
        </div>
    </div>

    <div class="flex-1 min-w-0">
        <div class="text-lg font-medium text-white mb-1">Security Posture</div>
        <div class="text-sm text-neutral-500 mb-4">{{ total_checks }} checks &middot; {{ issues|length }} issue{{ 's' if issues|length != 1 }}</div>

        {% if issues %}
        <div class="space-y-3">
            {% for issue in issues %}
            <div class="flex items-center justify-between gap-3 p-3 rounded-lg bg-neutral-950/30 border border-neutral-800">
                <div class="flex items-center gap-3 min-w-0">
                    <span class="w-2 h-2 rounded-full shrink-0
                        {% if issue.severity == 'critical' %}bg-red-500
                        {% elif issue.severity == 'high' %}bg-orange-600
                        {% else %}bg-yellow-600{% endif %}"></span>
                    <span class="text-sm text-neutral-300">{{ issue.name }}</span>
                </div>
                <span class="text-xs px-2 py-0.5 rounded shrink-0
                    {% if issue.severity == 'critical' %}bg-red-500/20 text-red-400
                    {% elif issue.severity == 'high' %}bg-orange-500/20 text-orange-400
                    {% else %}bg-yellow-500/20 text-yellow-400{% endif %}">{{ issue.severity }}</span>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="flex items-center gap-3 p-3 rounded-lg bg-green-500/10 border border-green-500/30 text-green-400">
            <i class="fas fa-check"></i>
            <span class="text-sm">All checks passed</span>
        </div>
        {% endif %}
    </div>
</div>
{% endif %}
