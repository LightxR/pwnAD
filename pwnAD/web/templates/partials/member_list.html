<div class="p-4">
    <h4 class="text-sm font-semibold text-white mb-2">Members of {{ group }} ({{ members|length }})</h4>
    <div class="flex flex-wrap gap-1">
        {% for m in members %}
        <span class="px-2 py-0.5 rounded bg-neutral-800 text-xs text-neutral-300">{{ m }}</span>
        {% endfor %}
        {% if members|length == 0 %}
        <span class="text-neutral-500 text-xs">No members found</span>
        {% endif %}
    </div>
</div>
