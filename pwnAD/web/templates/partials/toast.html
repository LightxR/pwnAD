<div class="flex items-center gap-3 px-4 py-3 rounded-lg border text-sm font-medium toast-enter
    {% if type == 'error' %}bg-red-500/10 border-red-500/50 text-red-400
    {% elif type == 'warning' %}bg-yellow-500/10 border-yellow-500/50 text-yellow-400
    {% elif type == 'info' %}bg-blue-500/10 border-blue-500/50 text-blue-400
    {% else %}bg-green-500/10 border-green-500/50 text-green-400{% endif %}">
    <i class="fas {% if type == 'error' %}fa-times-circle{% elif type == 'warning' %}fa-exclamation-triangle{% elif type == 'info' %}fa-info-circle{% else %}fa-check-circle{% endif %}"></i>
    <span>{{ message }}</span>
</div>
