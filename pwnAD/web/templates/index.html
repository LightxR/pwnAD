{% extends "base.html" %}
{% block title %}pwnAD - Dashboard{% endblock %}
{% block content %}
<div class="p-6 lg:p-8" hx-get="/api/dashboard/hero" hx-trigger="load" hx-swap="innerHTML">
    <!-- Skeleton -->
    <div class="space-y-8">
        <div class="bg-neutral-900/50 rounded-2xl p-8 lg:p-10 animate-pulse">
            <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">
                <div class="w-32 h-32 bg-neutral-800 rounded-full shrink-0 self-center lg:self-start"></div>
                <div class="flex-1 space-y-4">
                    <div class="h-9 bg-neutral-800 rounded w-56"></div>
                    <div class="h-4 bg-neutral-800 rounded w-40"></div>
                    <div class="grid grid-cols-5 gap-6 mt-8">
                        {% for _ in range(5) %}
                        <div>
                            <div class="h-8 bg-neutral-800 rounded w-12 mb-2"></div>
                            <div class="h-3 bg-neutral-800 rounded w-16"></div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="shrink-0 lg:w-56 space-y-2">
                    <div class="h-4 bg-neutral-800 rounded w-28"></div>
                    <div class="h-3 bg-neutral-800 rounded w-32"></div>
                    <div class="h-3 bg-neutral-800 rounded w-36 mt-3"></div>
                    <div class="h-3 bg-neutral-800 rounded w-40"></div>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div>
                <div class="h-3 bg-neutral-800 rounded w-24 mb-3"></div>
                <div class="bg-neutral-900/50 rounded-2xl overflow-hidden animate-pulse">
                    {% for _ in range(6) %}
                    <div class="flex items-center justify-between px-6 py-5 {% if not loop.first %}border-t border-neutral-800/50{% endif %}">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-neutral-800 rounded-lg"></div>
                            <div class="h-4 bg-neutral-800 rounded w-28"></div>
                        </div>
                        <div class="h-8 bg-neutral-800 rounded w-8"></div>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="space-y-8 animate-pulse">
                <div>
                    <div class="h-3 bg-neutral-800 rounded w-32 mb-3"></div>
                    <div class="bg-neutral-900/50 rounded-2xl p-6 space-y-5">
                        {% for _ in range(5) %}
                        <div class="flex justify-between">
                            <div class="h-4 bg-neutral-800 rounded w-28"></div>
                            <div class="h-5 bg-neutral-800 rounded w-10"></div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div>
                    <div class="h-3 bg-neutral-800 rounded w-24 mb-3"></div>
                    <div class="bg-neutral-900/50 rounded-2xl p-6 space-y-4">
                        <div class="h-5 bg-neutral-800 rounded w-20"></div>
                        <div class="h-3 bg-neutral-800 rounded w-36"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
