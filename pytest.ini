[pytest]
# Pytest configuration for pwnAD

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require test AD environment)
    slow: Slow running tests
    ldap: Tests related to LDAP operations
    kerberos: Tests related to Kerberos operations
    certificate: Tests related to certificate operations
    requires_ad: Tests that require an Active Directory test environment

# Coverage options
[coverage:run]
source = pwnAD
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
