# Pre-commit hooks configuration for pwnAD
# Install with: pip install pre-commit && pre-commit install

repos:
  # Code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=100']

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '100']

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=127', '--extend-ignore=E203,W503']

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-ll', '-r', 'pwnAD/']
        exclude: 'tests/'

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: 'tests/fixtures/'

  # Check for credentials in code
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'tests/fixtures/'

  # Prevent committing sensitive AD artifacts
  - repo: local
    hooks:
      - id: prevent-sensitive-files
        name: Prevent committing sensitive AD artifacts
        entry: bash -c 'if git diff --cached --name-only | grep -qE "\.(ccache|kirbi|pfx|p12|keytab)$"; then echo "ERROR: Attempting to commit sensitive files!"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: prevent-credentials
        name: Check for hardcoded credentials
        entry: bash -c 'if git diff --cached | grep -iE "(password|passwd|pwd)\s*=\s*['\''\"]\w+['\''\""]"; then echo "WARNING: Possible hardcoded credentials detected!"; exit 1; fi'
        language: system
        pass_filenames: false
